<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NN Image Playground</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header id="app-header">
        <div class="header-left">
            <span class="material-symbols-outlined logo-icon">neurology</span>
            <h1>NN Image Playground</h1>
        </div>
        <div class="header-right">
            <span id="device-badge" class="badge"></span>
            <span id="status-badge" class="badge badge-idle">Idle</span>
        </div>
    </header>

    <main id="app-layout">
        <!-- LEFT: Network Builder -->
        <aside id="panel-network" class="panel">
            <div class="panel-header">
                <h2><span class="material-symbols-outlined">account_tree</span> Network</h2>
                <button id="btn-build" class="btn btn-primary btn-sm" title="Build network">
                    <span class="material-symbols-outlined">build</span> Build
                </button>
            </div>

            <div class="panel-section">
                <label class="field-label">Add Layer</label>
                <div class="add-layer-row">
                    <select id="layer-type-select">
                        <option value="linear">Linear</option>
                        <option value="conv1d">Conv1D</option>
                        <option value="relu">ReLU</option>
                        <option value="leakyrelu">LeakyReLU</option>
                        <option value="sigmoid">Sigmoid</option>
                        <option value="tanh">Tanh</option>
                        <option value="silu">SiLU/Swish</option>
                        <option value="gelu">GELU</option>
                        <option value="batchnorm">BatchNorm</option>
                        <option value="layernorm">LayerNorm</option>
                        <option value="dropout">Dropout</option>
                    </select>
                    <button id="btn-add-layer" class="btn btn-accent btn-sm" title="Add layer">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>

            <div id="layer-list" class="layer-list">
                <!-- Layers will be added here -->
            </div>

            <div id="model-info" class="model-info hidden">
                <div class="info-row"><span>Parameters:</span><span id="param-count">-</span></div>
            </div>
        </aside>

        <!-- CENTER -->
        <section id="panel-center">
            <!-- Top: Image & Hyperparams -->
            <div id="panel-controls" class="panel">
                <div class="panel-header">
                    <h2><span class="material-symbols-outlined">tune</span> Controls</h2>
                </div>

                <div class="controls-grid">
                    <!-- Image Upload -->
                    <div class="control-group">
                        <label class="field-label">Image</label>
                        <div id="drop-zone" class="drop-zone">
                            <span class="material-symbols-outlined">upload_file</span>
                            <span>Drop image or click</span>
                            <input type="file" id="file-input" accept="image/*" hidden>
                        </div>
                    </div>

                    <!-- Hyperparams -->
                    <div class="control-group">
                        <label class="field-label">Learning Rate</label>
                        <input type="number" id="input-lr" value="0.001" step="0.0001" min="0.00001" max="1">
                    </div>
                    <div class="control-group">
                        <label class="field-label">Epochs</label>
                        <input type="number" id="input-epochs" value="500" step="50" min="1">
                    </div>
                    <div class="control-group">
                        <label class="field-label">Batch Size</label>
                        <input type="number" id="input-batch" value="4096" step="512" min="64">
                    </div>
                    <div class="control-group">
                        <label class="field-label">Viz Every N Epochs</label>
                        <input type="number" id="input-viz" value="10" step="1" min="1">
                    </div>

                    <!-- Training buttons -->
                    <div class="control-group control-buttons">
                        <button id="btn-start" class="btn btn-success"><span class="material-symbols-outlined">play_arrow</span> Start</button>
                        <button id="btn-stop" class="btn btn-danger" disabled><span class="material-symbols-outlined">stop</span> Stop</button>
                        <button id="btn-resume" class="btn btn-accent" disabled><span class="material-symbols-outlined">fast_forward</span> Resume</button>
                    </div>
                </div>

                <!-- Training stats -->
                <div id="train-stats" class="train-stats hidden">
                    <div class="stat"><span class="stat-label">Epoch</span><span id="stat-epoch" class="stat-value">0</span></div>
                    <div class="stat"><span class="stat-label">Loss</span><span id="stat-loss" class="stat-value">-</span></div>
                </div>
            </div>

            <!-- Bottom: Visualization -->
            <div id="panel-viz" class="panel">
                <div class="panel-header">
                    <h2><span class="material-symbols-outlined">visibility</span> Visualization</h2>
                </div>
                <div class="viz-container">
                    <div class="viz-item">
                        <span class="viz-label">Original (Grayscale)</span>
                        <canvas id="canvas-original" width="256" height="256"></canvas>
                    </div>
                    <div class="viz-item">
                        <span class="viz-label">Network Output</span>
                        <canvas id="canvas-output" width="256" height="256"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- RIGHT: Color Gradient Editor -->
        <aside id="panel-gradient" class="panel">
            <div class="panel-header">
                <h2><span class="material-symbols-outlined">palette</span> Color Map</h2>
            </div>

            <div class="panel-section">
                <label class="field-label">Gradient Preview</label>
                <canvas id="gradient-preview" width="280" height="30"></canvas>
            </div>

            <div class="panel-section">
                <label class="field-label">
                    Color Stops
                    <button id="btn-add-stop" class="btn btn-accent btn-xs" title="Add stop">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </label>
                <div id="stop-list" class="stop-list">
                    <!-- Color stops here -->
                </div>
            </div>

            <div class="gradient-presets">
                <label class="field-label">Presets</label>
                <div class="preset-buttons">
                    <button class="btn btn-sm preset-btn" data-preset="grayscale">Grayscale</button>
                    <button class="btn btn-sm preset-btn" data-preset="heatmap">Heatmap</button>
                    <button class="btn btn-sm preset-btn" data-preset="cool">Cool</button>
                    <button class="btn btn-sm preset-btn" data-preset="viridis">Viridis</button>
                    <button class="btn btn-sm preset-btn" data-preset="plasma">Plasma</button>
                    <button class="btn btn-sm preset-btn" data-preset="inferno">Inferno</button>
                </div>
            </div>

            <div class="gradient-actions">
                <button id="btn-apply-color" class="btn btn-primary"><span class="material-symbols-outlined">colorize</span> Apply</button>
                <button id="btn-save" class="btn btn-success"><span class="material-symbols-outlined">download</span> Save</button>
            </div>

            <!-- Colorized preview -->
            <div class="panel-section">
                <label class="field-label">Colorized Preview</label>
                <canvas id="canvas-colorized" width="256" height="256"></canvas>
            </div>
        </aside>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
